<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="tbg.css">
  <script defer src="tbg.js"></script>
  <meta charset="UTF-8">
  <title>THE THREE DOORS</title>
</head>

<body>
  <div class="game">

    <div id="container">
      <h1 class="title">THE THREE DOORS</h1>
      <p class="subtitle">You were not meant to wake up.</p>
      <button id="enterBtn">Enter</button>
    </div>
    
    <div id="btn-container">
      <p id="text"></p>

      <div>
        <button id="prevBtn" class="game-btn" style="display:none;">Back</button>
        <button id="nextBtn" class="game-btn" style="display:none;">Next</button>
      </div>
    </div>

    <button id="actionBtn" style="display:none;"></button>

  </div>
  <footer>
    <section id="instructions">
    <p></p>
    </section>
  </footer>
</body>
</html>
